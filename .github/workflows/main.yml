name: Action Mes Dates
on: [push]
jobs:
  job-exercice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4
      - name: Installation PHPCS
        run: sudo apt-get update && sudo apt install -y php-codesniffer
      - name: Verification de la norme (Lint)
        run: phpcs --standard=PSR12 MesDates.php
